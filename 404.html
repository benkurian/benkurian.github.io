<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Ben Kurian</title>
<meta name="description" content="The page you're looking for doesn't exist.">
<meta name="theme-color" content="#6B1222">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Libre+Franklin:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  .notfound {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 24px;
    position: relative;
  }

  .notfound-label {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 32px;
  }

  .notfound-code {
    font-family: var(--display);
    font-size: clamp(100px, 18vw, 180px);
    font-weight: 300;
    line-height: 0.9;
    color: var(--cream);
    opacity: 0.08;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    user-select: none;
    pointer-events: none;
    letter-spacing: -0.02em;
  }

  .notfound-title {
    font-family: var(--display);
    font-size: clamp(32px, 5vw, 54px);
    font-weight: 400;
    line-height: 1.2;
    letter-spacing: 0.01em;
    color: var(--cream);
    margin-bottom: 20px;
    position: relative;
  }

  .notfound-rule {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 24px;
  }

  .notfound-desc {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 300;
    color: var(--cream-dim);
    line-height: 1.7;
    max-width: 360px;
    margin-bottom: 48px;
    position: relative;
  }

  .notfound-back {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cream);
    text-decoration: none;
    padding: 14px 32px;
    border: 1px solid var(--rule-light);
    position: relative;
    transition: color 0.35s ease, border-color 0.35s ease;
    overflow: hidden;
    display: inline-block;
  }

  .notfound-back::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.45s var(--ease-out-expo);
    z-index: -1;
  }

  .notfound-back:hover {
    color: var(--bg-deep);
    border-color: var(--gold);
  }

  .notfound-back:hover::before {
    transform: scaleX(1);
  }

  .notfound-ornament {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, transparent, var(--gold-dim));
    margin: 0 auto 32px;
  }
</style>
</head>
<body>

<header class="masthead scrolled">
  <div class="masthead-inner">
    <a href="/" class="masthead-brand">Ben Kurian</a>
  </div>
</header>

<section class="notfound">
  <div class="notfound-code" aria-hidden="true">404</div>
  <div class="notfound-ornament"></div>
  <div class="notfound-label">Error 404</div>
  <h1 class="notfound-title">Page Not Found</h1>
  <div class="notfound-rule"></div>
  <p class="notfound-desc">The page you're looking for has moved, or never existed.</p>
  <a href="/" class="notfound-back">Return Home</a>
</section>

</body>
</html>
